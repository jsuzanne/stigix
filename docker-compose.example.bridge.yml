# SD-WAN Traffic Generator - All-in-One Deployment (Bridge Mode)
#
# This configuration runs EVERYTHING (Dashboard, Traffic Gen, Voice, Echo, XFR, MCP) 
# inside a single container, but uses Docker's default bridge network.
#
# IMPORTANT: 
# - This mode is intended for macOS and Windows/WSL where host mode has limitations.
# - Some advanced Layer 2 / Raw socket features (like full IP spoofing for Voice Simulation
#   and ARP/DHCP tests for IoT) may be degraded or blocked in bridge mode.

services:
  stigix:
    image: jsuzanne/stigix:stable
    container_name: stigix
    
    # Bridge mode: Explicit port mapping instead of network_mode: host
    ports:
      - "8080:8080"      # Web Dashboard and API
      - "8082:8082"      # HTTP Target Health/Status
      - "9000:9000"      # XFR Bandwidth Target
      - "5201:5201/tcp"  # iperf3 (TCP)
      - "5201:5201/udp"  # iperf3 (UDP)
      - "6100-6101:6100-6101/udp" # RTP Voice Echo ports
      - "6200:6200/udp"  # Convergence / UDP Probes

    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    
    # Volumes for persistence
    volumes:
      - ./config:/app/config
      - ./logs:/var/log/sdwan-traffic-gen
      - ./mcp-data:/app/mcp-data
      
    # Core environment variables
    environment:
      # --- Role Management ---
      # Can be: both, source, target
      - STIGIX_ROLE=${STIGIX_ROLE:-both}
      
      # --- General Settings ---
      # Force Prisma target URLs to start immediately without Web UI trigger
      - AUTO_START_TRAFFIC=${AUTO_START_TRAFFIC:-false}
      - DEBUG=${DEBUG:-false}
      
      # --- Web UI / Server ---
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      
      # --- Traffic Generator ---
      # Delay between Prisma SASE traffic cycles
      - SLEEP_BETWEEN_REQUESTS=${SLEEP_BETWEEN_REQUESTS:-1}
      
      # --- Prisma SASE Config (Optional) ---
      # If provided, application dynamically discovers targets via SASE API
      - PRISMA_SDWAN_REGION=${PRISMA_SDWAN_REGION:-}
      - PRISMA_SDWAN_TSGID=${PRISMA_SDWAN_TSGID:-}
      - PRISMA_SDWAN_CLIENT_ID=${PRISMA_SDWAN_CLIENT_ID:-}
      - PRISMA_SDWAN_CLIENT_SECRET=${PRISMA_SDWAN_CLIENT_SECRET:-}

      # --- Target/Responder Settings ---
      - TARGET_HTTP_PORT=8082
      - XFR_PORT=9000
      - XFR_MAX_DURATION=60
      - XFR_RATE_LIMIT=2
      - XFR_ALLOW_CIDR=0.0.0.0/0
      
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
