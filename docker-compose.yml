services:
  # Web Dashboard - Starts first and generates config
  web-ui:
    build:
      context: .
      dockerfile: web-dashboard/Dockerfile
    container_name: sdwan-web-ui
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
      - traffic_logs:/var/log/sdwan-traffic-gen
      - ./VERSION:/app/VERSION:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PRISMA_SDWAN_REGION=${PRISMA_SDWAN_REGION:-}
      - PRISMA_SDWAN_TSGID=${PRISMA_SDWAN_TSGID:-}
      - PRISMA_SDWAN_CLIENT_ID=${PRISMA_SDWAN_CLIENT_ID:-}
      - PRISMA_SDWAN_CLIENT_SECRET=${PRISMA_SDWAN_CLIENT_SECRET:-}
      - TARGET_IP=${TARGET_IP:-142.132.193.157}
      - CONFIG_DIR=/app/config
      - LOG_DIR=/var/log/sdwan-traffic-gen
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-7}
      - LOG_MAX_SIZE_MB=${LOG_MAX_SIZE_MB:-100}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      # Default connectivity probes (User customized)
      - CONNECTIVITY_HTTP_1=DC1-App:http://192.168.203.100
      - CONNECTIVITY_HTTP_2=BGW7-App:http://192.168.203.100
      - CONNECTIVITY_HTTP_3=Branch-Router-http:http://192.168.206.10
      - CONNECTIVITY_PING_1=Branch-Router-ping:192.168.206.10
      - CONNECTIVITY_PING_2=Hetzner-Server-ping:142.132.193.157
      # --- Registry & Discovery ---
      - STIGIX_REGISTRY_ENABLED=${STIGIX_REGISTRY_ENABLED:-true}
      - STIGIX_REGISTRY_URL=${STIGIX_REGISTRY_URL:-https://stigix-registry.jlsuzanne.workers.dev}
      - STIGIX_REGISTRY_MODE=${STIGIX_REGISTRY_MODE:-peer}
      - STIGIX_REGISTRY_HEARTBEAT_SEC=${STIGIX_REGISTRY_HEARTBEAT_SEC:-300}
      - STIGIX_REGISTRY_DISCOVERY_SEC=${STIGIX_REGISTRY_DISCOVERY_SEC:-120}
      # --- Stigix Cloud Probes ---
      - STIGIX_TARGET_BASE_URL=${STIGIX_TARGET_BASE_URL:-}
      - STIGIX_TARGET_SHARED_KEY=${STIGIX_TARGET_SHARED_KEY:-}
      - STIGIX_TARGET_MASTER_KEY=${STIGIX_TARGET_MASTER_KEY:-}
    healthcheck:
      test: [ "CMD-SHELL", "test -f /app/config/applications.txt -o -f /app/config/applications-config.json" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Traffic Generator - Starts after web-ui is healthy
  traffic-gen:
    build:
      context: .
      dockerfile: Dockerfile.traffic-gen
    container_name: sdwan-traffic-gen
    restart: unless-stopped
    volumes:
      - ./config:/opt/sdwan-traffic-gen/config
      - traffic_logs:/var/log/sdwan-traffic-gen
    environment:
      - SLEEP_BETWEEN_REQUESTS=${SLEEP_BETWEEN_REQUESTS:-1}
    depends_on:
      web-ui:
        condition: service_healthy

  # Voice Traffic Generator (RTP/Voice)
  voice-gen:
    build:
      context: .
      dockerfile: Dockerfile.voice
    container_name: sdwan-voice-gen
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./config:/app/config
      - traffic_logs:/var/log/sdwan-traffic-gen
    depends_on:
      web-ui:
        condition: service_healthy

  # Voice Echo Server (Local target for testing)
  voice-echo:
    image: jsuzanne/sdwan-voice-echo:stable
    container_name: sdwan-voice-echo
    network_mode: host
    restart: unless-stopped
    environment:
      - DEBUG=True
    volumes:
      - ./engines:/app/engines
      - ./VERSION:/app/VERSION:ro

  # XFR Speedtest Target (Local target for testing)
  xfr-target:
    image: jsuzanne/xfr-target:stable
    container_name: xfr-target
    network_mode: host
    restart: unless-stopped
    environment:
      - XFR_PORT=9000
      - XFR_MAX_DURATION=60
      - XFR_RATE_LIMIT=2
      - XFR_ALLOW_CIDR=0.0.0.0/0

  # MCP Server - Natural Language Orchestration
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: sdwan-mcp
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=3100
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config:ro
    depends_on:
      web-ui:
        condition: service_healthy

volumes:
  traffic_logs:
