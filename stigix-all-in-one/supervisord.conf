[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:web-ui]
command=npx tsx server.ts
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/sdwan-traffic-gen/web-ui.err.log
stdout_logfile=/var/log/sdwan-traffic-gen/web-ui.out.log
environment=NODE_ENV="production",PORT="8080"

[program:traffic-gen]
command=/bin/bash /app/traffic-generator.sh client-docker
directory=/app
autostart=true
autorestart=true
startsecs=15
stderr_logfile=/var/log/sdwan-traffic-gen/traffic-gen.err.log
stdout_logfile=/var/log/sdwan-traffic-gen/traffic-gen.out.log

[program:voice-gen]
command=python3 -u voice_orchestrator.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/sdwan-traffic-gen/voice-gen.err.log
stdout_logfile=/var/log/sdwan-traffic-gen/voice-gen.out.log

[program:voice-echo]
command=/bin/bash /app/engines/start_target.sh
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/sdwan-traffic-gen/voice-echo.err.log
stdout_logfile=/var/log/sdwan-traffic-gen/voice-echo.out.log

[program:xfr-target]
command=/usr/local/bin/xfr serve --port %(env(XFR_PORT)s) --max-duration %(env(XFR_MAX_DURATION)s)s --rate-limit %(env(XFR_RATE_LIMIT)s) --allow %(env(XFR_ALLOW_CIDR)s)
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/sdwan-traffic-gen/xfr-target.err.log
stdout_logfile=/var/log/sdwan-traffic-gen/xfr-target.out.log
